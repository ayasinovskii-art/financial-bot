name: pipeline
on:
  schedule:
    - cron: '7 * * * *'        # hourly heartbeat (start DISABLED — see Task 11)
  workflow_dispatch:
    inputs:
      force_stage:
        description: 'Run a specific stage (overrides dispatcher)'
        required: false
        default: ''
      dry_run:
        description: 'Coder dry-run (no push/PR)'
        required: false
        default: 'false'

permissions: {}

concurrency:
  group: bot-pipeline
  cancel-in-progress: false

env:
  MANAGER_INVENTS: '0'         # set to '1' to let the manager invent ideas with empty queue

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      issues: read
    outputs:
      stage: ${{ steps.pick.outputs.stage }}
      issue: ${{ steps.pick.outputs.issue }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd   # v5
      - id: pick
        env:
          GH_TOKEN: ${{ github.token }}
          MANAGER_INVENTS: ${{ env.MANAGER_INVENTS }}
        run: |
          if [[ -n "${{ inputs.force_stage }}" ]]; then
            echo "stage=${{ inputs.force_stage }}" >> "$GITHUB_OUTPUT"
            echo "issue=" >> "$GITHUB_OUTPUT"
          else
            bash scripts/pipeline/dispatch.sh
          fi
      - run: echo "Tick -> stage=${{ steps.pick.outputs.stage }} issue=${{ steps.pick.outputs.issue }}"

  manager:
    needs: dispatch
    if: needs.dispatch.outputs.stage == 'manager'
    runs-on: ubuntu-latest
    permissions: { issues: write, id-token: write }
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd   # v5
      - uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1   # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            ISSUE=${{ needs.dispatch.outputs.issue }}
            Read .github/pipeline/prompts/manager.md and execute the MANAGER role.

  analyst:
    needs: dispatch
    if: needs.dispatch.outputs.stage == 'analysis'
    runs-on: ubuntu-latest
    permissions: { contents: read, issues: write, id-token: write }
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd   # v5
      - uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1   # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            ISSUE=${{ needs.dispatch.outputs.issue }}
            Read .github/pipeline/prompts/analyst.md and execute the ANALYST role.

  techlead:
    needs: dispatch
    if: needs.dispatch.outputs.stage == 'planning'
    runs-on: ubuntu-latest
    permissions: { contents: read, issues: write, id-token: write }
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd   # v5
      - uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1   # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            ISSUE=${{ needs.dispatch.outputs.issue }}
            Read .github/pipeline/prompts/techlead.md and execute the TECH LEAD role.

  coder:
    needs: dispatch
    if: needs.dispatch.outputs.stage == 'coding'
    runs-on: ubuntu-latest
    permissions: { contents: write, pull-requests: write, issues: write, id-token: write }
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd   # v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2   # v5
        with: { dotnet-version: '10.0.x' }
      - uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1   # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            ISSUE=${{ needs.dispatch.outputs.issue }}
            DRY_RUN=${{ inputs.dry_run == 'true' && '1' || '0' }}
            Read .github/pipeline/prompts/coder.md and execute the CODER role.

  qa:
    needs: dispatch
    if: needs.dispatch.outputs.stage == 'qa'
    runs-on: ubuntu-latest
    permissions: { contents: read, issues: write, id-token: write }
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd   # v5
        with: { fetch-depth: 0 }
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2   # v5
        with: { dotnet-version: '10.0.x' }
      - uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1   # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            ISSUE=${{ needs.dispatch.outputs.issue }}
            Read .github/pipeline/prompts/qa.md and execute the QA role.

  security:
    needs: dispatch
    if: needs.dispatch.outputs.stage == 'security'
    runs-on: ubuntu-latest
    permissions: { contents: read, issues: write, id-token: write }
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd   # v5
        with: { fetch-depth: 0 }
      - uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1   # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            ISSUE=${{ needs.dispatch.outputs.issue }}
            Read .github/pipeline/prompts/security.md and execute the SECURITY role.

  reviewer:
    needs: dispatch
    if: needs.dispatch.outputs.stage == 'review'
    runs-on: ubuntu-latest
    permissions: { contents: write, pull-requests: write, issues: write, id-token: write }
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd   # v5
        with: { fetch-depth: 0 }
      - uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1   # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-8
            --allowedTools "Bash,Edit,Write,Read,Glob,Grep"
          prompt: |
            ISSUE=${{ needs.dispatch.outputs.issue }}
            Read .github/pipeline/prompts/reviewer.md and execute the REVIEWER role.

  # Self-chaining: when this tick did real, successful work, re-trigger the workflow
  # so the conveyor advances at job speed instead of waiting on the throttled cron.
  # GITHUB_TOKEN may trigger workflow_dispatch in the same repo (no PAT needed); the
  # gate fires only on success (!failure) and a non-idle stage, so an idle tick or a
  # role failure stops the chain. The hourly cron above stays as a self-healing backstop.
  continue:
    needs: [dispatch, manager, analyst, techlead, coder, qa, security, reviewer]
    if: ${{ !failure() && !cancelled() && needs.dispatch.outputs.stage != 'idle' }}
    runs-on: ubuntu-latest
    permissions: { actions: write }
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pipeline.yml -R ${{ github.repository }}
